<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RxPro Prescription Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;padding:12px;min-height:100vh}
#app{max-width:640px;margin:0 auto}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 16px rgba(0,0,0,.12);margin-bottom:12px}
.hdr{background:#1d6e3f;color:#fff;padding:18px 20px}
.hdr h1{font-size:19px;font-weight:700;margin-bottom:3px}
.hdr p{font-size:12px;opacity:.88;margin:2px 0}
.rxn{display:inline-block;background:rgba(255,255,255,.2);border-radius:5px;padding:2px 10px;font-size:11px;margin-top:7px;letter-spacing:.8px}
.sec{padding:14px 18px;border-bottom:1px solid #e8f5e9}
.sec:last-child{border-bottom:none}
.lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.val{font-size:13px;color:#222;font-weight:500;line-height:1.5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dx{background:#f0fff4;border-left:3px solid #1d6e3f;padding:10px 14px;border-radius:0 6px 6px 0;font-size:14px;color:#1a5c33;font-weight:600}
.med{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.med:last-child{border-bottom:none}
.mno{background:#1d6e3f;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.mname{font-size:14px;font-weight:700;color:#1d6e3f}
.mdose{font-size:12px;color:#555;margin-top:3px}
.foot{background:#f8fafb;padding:14px 18px;font-size:11px;color:#888;text-align:center}
.pbtn{display:inline-block;margin-top:8px;color:#1d6e3f;cursor:pointer;border:1px solid #1d6e3f;border-radius:6px;padding:6px 18px;font-size:12px;text-decoration:none}
.err{text-align:center;padding:50px 24px;color:#c53030}
.loading{text-align:center;padding:50px;color:#666}
@media print{
  body{background:#fff;padding:0}
  .card{box-shadow:none;border-radius:0}
  .pbtn,.foot{display:none}
}
</style>
</head>
<body>
<div id="app">
  <div class="card">
    <div class="loading" id="loading">Loading prescription...</div>
  </div>
</div>
<script>
(function () {
  function show(d) {
    var meds = d.M || [];
    var medHtml = meds.map(function(m, i) {
      return '<div class="med">' +
        '<div class="mno">' + (i+1) + '</div>' +
        '<div><div class="mname">' + esc(m.n) + '</div>' +
        (m.d ? '<div class="mdose">' + esc(m.d) + '</div>' : '') +
        '</div></div>';
    }).join('');

    var html = '<div class="hdr">' +
      '<h1>' + esc(d.Dr) + '</h1>' +
      '<p>' + esc(d.Cl) + '</p>' +
      '<span class="rxn">Rx# ' + esc(d.Rx) + '</span>' +
      '</div>' +
      '<div class="sec"><div class="grid">' +
        '<div><div class="lbl">Patient</div><div class="val">' + esc(d.Pt) + '</div></div>' +
        '<div><div class="lbl">Date</div><div class="val">' + esc(d.Dt) + '</div></div>' +
      '</div></div>';

    if (d.Dx) html += '<div class="sec"><div class="lbl">Diagnosis</div><div class="dx">' + esc(d.Dx) + '</div></div>';

    if (meds.length) html += '<div class="sec"><div class="lbl">Medicines</div>' + medHtml + '</div>';

    if (d.Av) html += '<div class="sec"><div class="lbl">Advice</div><div class="val">' + esc(d.Av) + '</div></div>';
    if (d.Fu) html += '<div class="sec"><div class="lbl">Follow-up</div><div class="val">' + esc(d.Fu) + '</div></div>';

    html += '<div class="foot">Verified Digital Prescription &nbsp;|&nbsp; Reg: ' + esc(d.Rg) +
      '<br><a class="pbtn" href="javascript:window.print()">&#128438; Print Prescription</a></div>';

    document.getElementById('app').innerHTML = '<div class="card">' + html + '</div>';
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  try {
    var hash = window.location.hash.slice(1);
    if (!hash) throw new Error('no data');
    var d = JSON.parse(decodeURIComponent(hash));
    show(d);
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="card"><div class="err"><h2>No prescription data</h2>' +
      '<p style="margin-top:8px;font-size:13px;color:#666">Scan a valid RxPro QR code to view a prescription.</p></div></div>';
  }
})();
</script>
</body>
</html>
