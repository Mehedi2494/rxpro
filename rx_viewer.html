<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>RxPro Prescription</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Hind+Siliguri:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh;padding:12px}
.page{max-width:720px;margin:0 auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12)}
/* HEADER */
.hdr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 20px;gap:10px}
.hdr-en{text-align:left}
.hdr-bn{text-align:right;font-family:'Hind Siliguri',sans-serif}
.hdr-logo{display:flex;flex-direction:column;align-items:center;gap:4px}
.hdr-logo img{border-radius:50%;object-fit:contain;max-width:70px;max-height:70px}
.dr-name{font-size:17px;font-weight:700;line-height:1.3}
.dr-sub{font-size:11px;line-height:1.5;opacity:.9}
.dr-reg{font-size:10px;margin-top:3px;opacity:.85}
.spec-tag{font-size:10px;background:rgba(255,255,255,.18);border-radius:4px;padding:2px 8px;margin-top:4px;display:inline-block;text-align:center}
/* PATIENT ROW */
.pt-row{display:grid;grid-template-columns:2.2fr 1fr 1.2fr 1.6fr 1fr 0.9fr;border:1.5px solid var(--ac);border-radius:8px;margin:10px 18px;overflow:hidden}
.pt-field{padding:6px 10px;border-right:1px solid rgba(0,0,0,.08)}
.pt-field:last-child{border-right:none;background:rgba(0,0,0,.04);text-align:center}
.pt-field label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#68a885;display:block;margin-bottom:2px}
.pt-field span{font-size:12px;font-weight:600;color:#1a202c;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt-field:first-child{border-left:3px solid var(--ac)}
.pt-field:first-child span{font-size:13px;font-weight:700;white-space:normal}
.rxno-span{font-family:'JetBrains Mono',monospace!important;font-weight:700;color:var(--hc)!important;letter-spacing:.5px}
/* BODY */
.body{display:flex;gap:0;padding:6px 18px 10px;min-height:300px}
.col-left{width:36%;flex-shrink:0;padding-right:10px;border-right:1.5px dashed rgba(0,0,0,.12)}
.col-right{flex:1;padding-left:12px}
.sec{margin-bottom:9px;padding-bottom:8px;border-bottom:1px dashed #e2e8f0}
.sec:last-child{border-bottom:none}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding-bottom:4px;margin-bottom:5px;border-bottom:1.5px solid var(--ac);display:flex;align-items:center;gap:4px}
.rx-sym{font-size:16px;font-weight:700;font-family:'Playfair Display',serif}
.sec-body{font-size:11px;font-weight:600;line-height:1.7;color:#1a202c}
/* MEDICINES */
.med-item{margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid #f0f4f8}
.med-item:last-child{border-bottom:none;margin-bottom:0}
.med-tag{display:inline-block;font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;margin-right:4px;background:rgba(0,0,0,.08);color:#444;vertical-align:middle}
.med-name{font-size:13px;font-weight:700;color:#1a202c;line-height:1.3}
.med-generic{font-size:10px;font-weight:400;color:#666;margin-left:4px}
.med-detail{font-size:11px;color:#444;margin-top:2px;line-height:1.4}
.dots{color:#bbb;margin:0 3px}
/* FOOTER */
.ftr{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;gap:10px}
.ftr-clinic{flex:1}
.ftr-clinic-label{font-size:10px;font-family:'Hind Siliguri',sans-serif;font-weight:600;margin-bottom:3px}
.ftr-clinic-name{font-size:15px;font-weight:800;font-family:'Hind Siliguri',sans-serif;line-height:1.3}
.ftr-clinic-addr{font-size:10px;opacity:.8;line-height:1.5}
.ftr-qr{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.ftr-timing{flex:1;text-align:right;font-family:'Hind Siliguri',sans-serif}
.ftr-timing h4{font-size:11px;font-weight:700;margin-bottom:3px}
.ftr-timing p{font-size:11px;opacity:.85;line-height:1.5}
/* PRINT */
.print-btn{display:block;width:100%;text-align:center;padding:10px;font-size:13px;color:#1d6e3f;cursor:pointer;border:none;background:transparent;border-top:0.5px solid #e2e8f0;font-weight:500}
@media print{body{background:#fff;padding:0}.page{box-shadow:none;border-radius:0}.print-btn{display:none}}
@media(max-width:600px){
  .pt-row{grid-template-columns:1fr 1fr;border-radius:6px}
  .pt-field:nth-child(2n){border-right:none}
  .pt-field:nth-child(n+3){border-top:1px solid rgba(0,0,0,.08)}
  .pt-field:last-child{grid-column:1/-1;background:rgba(0,0,0,.04)}
  .body{flex-direction:column}
  .col-left{width:100%;border-right:none;border-bottom:1.5px dashed rgba(0,0,0,.12);padding-right:0;padding-bottom:10px;margin-bottom:10px}
  .col-right{padding-left:0}
  .hdr{grid-template-columns:1fr auto}
  .hdr-bn{display:none}
  .ftr{flex-wrap:wrap}
  .ftr-timing{flex:100%;text-align:left;margin-top:6px}
}
</style>
</head>
<body>
<div class="page" id="page">
  <div style="text-align:center;padding:40px;color:#888" id="loading">Loading prescription...</div>
</div>
<script>
(function(){
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

try{
  var raw=window.location.hash.slice(1);
  if(!raw)throw new Error('no data');
  var d=JSON.parse(decodeURIComponent(raw));

  var hc=d.Hc||'#1d6e3f';
  var ac=d.Ac||'#27ae60';
  var fc=d.Fc||'#1d6e3f';
  var ft=d.Ft||'#d4edda';

  var page=document.getElementById('page');
  page.style.setProperty('--hc',hc);
  page.style.setProperty('--ac',ac);

  // HEADER
  var hdrHtml='<div class="hdr" style="background:'+hc+';color:#fff">'
    +'<div class="hdr-en">'
    +'<div class="dr-name">'+esc(d.Dr)+'</div>'
    +(d.Q?'<div class="dr-sub">'+esc(d.Q)+'</div>':'')
    +(d.Dg?'<div class="dr-sub">'+esc(d.Dg)+'</div>':'')
    +(d.Dp?'<div class="dr-sub">'+esc(d.Dp)+'</div>':'')
    +'<div class="dr-reg">Reg: '+esc(d.Rg)+(d.Ph?' | '+esc(d.Ph):'')+'</div>'
    +'</div>'
    +'<div class="hdr-logo">'
    +(d.Sp||d.SpB?'<div class="spec-tag" style="color:'+ft+'">'+esc(d.Sp||d.SpB)+'</div>':'')
    +'</div>'
    +'<div class="hdr-bn">'
    +(d.DrB?'<div class="dr-name">'+esc(d.DrB)+'</div>':'')
    +(d.QB?'<div class="dr-sub">'+esc(d.QB)+'</div>':'')
    +(d.DgB?'<div class="dr-sub">'+esc(d.DgB)+'</div>':'')
    +'</div>'
    +'</div>';

  // PATIENT ROW
  var ptHtml='<div class="pt-row">'
    +'<div class="pt-field"><label>Patient Name</label><span>'+esc(d.Pt)+'</span></div>'
    +'<div class="pt-field"><label>Age / Sex</label><span>'+esc((d.Pa||'')+(d.Pg?' / '+d.Pg:''))+'</span></div>'
    +'<div class="pt-field"><label>Phone</label><span>'+esc(d.Pp)+'</span></div>'
    +'<div class="pt-field"><label>Address</label><span>'+esc(d.PAd)+'</span></div>'
    +'<div class="pt-field"><label>Date</label><span>'+esc(d.Dt)+'</span></div>'
    +'<div class="pt-field"><label>Rx No.</label><span class="rxno-span" style="color:'+hc+'">'+esc(d.Rx)+'</span></div>'
    +'</div>';

  // LEFT COL
  var leftHtml='';
  if(d.CC||d.OE){
    leftHtml+='<div class="sec"><div class="sec-title" style="color:'+ac+';border-bottom-color:'+ac+'">Vitals &amp; Examination</div>'
      +(d.CC?'<div class="sec-body"><strong style="color:'+ac+'">C/C:</strong> '+esc(d.CC)+'</div>':'')
      +(d.OE?'<div class="sec-body"><strong style="color:'+ac+'">O/E:</strong> '+esc(d.OE)+'</div>':'')
      +'</div>';
  }
  if(d.Inv&&d.Inv.length){
    leftHtml+='<div class="sec"><div class="sec-title" style="color:'+ac+';border-bottom-color:'+ac+'">Investigations</div>'
      +'<div class="sec-body">'+d.Inv.map(function(x){return esc(x)}).join('<br>')+'</div></div>';
  }
  if(d.Dx&&d.Dx.length){
    leftHtml+='<div class="sec"><div class="sec-title" style="color:'+ac+';border-bottom-color:'+ac+'">Diagnosis</div>'
      +'<div class="sec-body">'+d.Dx.map(function(x){return esc(x)}).join('<br>')+'</div></div>';
  }
  if(!leftHtml) leftHtml='<div style="color:#ccc;font-size:11px;padding:8px 0">—</div>';

  // MEDICINES
  var meds=d.M||[];
  var medsHtml=meds.length?meds.map(function(m){
    var detail=[m.fr,m.ins,m.du].filter(Boolean).join('<span class="dots">........</span>');
    return '<div class="med-item">'
      +(m.t?'<span class="med-tag">'+esc(m.t)+'</span>':'')
      +'<div class="med-name">'+esc(m.n)+(m.do?' '+esc(m.do):'')
      +(m.g?'<span class="med-generic">'+esc(m.g)+'</span>':'')+'</div>'
      +(detail?'<div class="med-detail">'+detail+'</div>':'')
      +'</div>';
  }).join(''):'<div style="color:#aaa;font-size:11px;padding:4px 0">No medicines</div>';

  var rightHtml='<div class="sec"><div class="sec-title" style="color:'+ac+';border-bottom-color:'+ac+'">'
    +'<span class="rx-sym">℞</span> Prescription</div>'+medsHtml+'</div>';
  if(d.Av) rightHtml+='<div class="sec"><div class="sec-title" style="color:'+ac+';border-bottom-color:'+ac+'">Advice</div><div class="sec-body">'+esc(d.Av)+'</div></div>';
  if(d.Fu) rightHtml+='<div style="font-size:11px;font-weight:600;color:'+hc+'">Follow-up: '+esc(d.Fu)+'</div>';

  // FOOTER
  var ftrHtml='<div class="ftr" style="background:'+fc+';color:'+ft+'">'
    +'<div class="ftr-clinic">'
    +'<div class="ftr-clinic-label" style="color:'+ft+'">চেম্বারঃ</div>'
    +'<div class="ftr-clinic-name" style="color:#fff">'+esc(d.Cl)+'</div>'
    +(d.Ca?'<div class="ftr-clinic-addr" style="color:'+ft+'">'+esc(d.Ca)+'</div>':'')
    +(d.Cs?'<div class="ftr-clinic-addr" style="color:#fbbf24;font-weight:600">সিরিয়ালঃ '+esc(d.Cs)+'</div>':'')
    +(d.Ce?'<div class="ftr-clinic-addr" style="color:'+ft+'">জরুরিঃ '+esc(d.Ce)+'</div>':'')
    +'</div>'
    +'<div class="ftr-qr"><div id="qr-box"></div><div style="font-size:8px;opacity:.7;margin-top:2px">Verified Rx</div></div>'
    +(d.Ct?'<div class="ftr-timing"><h4 style="color:#fff">রোগী দেখার সময় :</h4><p style="color:'+ft+'">'+esc(d.Ct)+'</p></div>':'<div style="flex:1"></div>')
    +'</div>';

  page.innerHTML=hdrHtml+ptHtml
    +'<div class="body"><div class="col-left">'+leftHtml+'</div><div class="col-right">'+rightHtml+'</div></div>'
    +ftrHtml
    +'<button class="print-btn" onclick="window.print()">&#128438; Print this prescription</button>';

  // Generate QR of this page URL for re-sharing
  var qrBox=document.getElementById('qr-box');
  if(qrBox&&window.QRCode){
    new QRCode(qrBox,{text:window.location.href,width:52,height:52,colorDark:'#fff',colorLight:fc,correctLevel:QRCode.CorrectLevel.M});
    setTimeout(function(){var el=qrBox.querySelector('img,canvas');if(el){el.style.display='block';el.style.maxWidth='52px';}},100);
  }

}catch(e){
  document.getElementById('page').innerHTML='<div style="text-align:center;padding:50px 24px">'
    +'<div style="font-size:18px;font-weight:600;color:#c53030;margin-bottom:8px">No prescription data</div>'
    +'<div style="font-size:13px;color:#888">Scan a valid RxPro QR code to view a prescription.</div>'
    +'</div>';
}
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
